<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrainOK | Personal Research Lab</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Favicon / iOS icons (모두 루트(/)에 파일 배치) -->
  <link rel="icon" href="/brain.svg" type="image/svg+xml">
  <link rel="icon" href="/favicon-32x32.png" sizes="32x32" type="image/png">
  <link rel="icon" href="/favicon-16x16.png" sizes="16x16" type="image/png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180">
  <link rel="apple-touch-icon-precomposed" href="/apple-touch-icon-precomposed.png" sizes="180x180">
  <meta name="apple-mobile-web-app-title" content="BrainOK">
  <meta name="theme-color" content="#f5f6f8">

  <style>
    @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap");

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: "Noto Sans KR", -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: #f5f6f8;
      letter-spacing: 0;
    }

    .page-link:focus-visible {
      outline: 3px solid rgba(6, 182, 212, 0.45);
      outline-offset: 3px;
    }
  </style>
</head>
<body class="min-h-screen text-slate-950 antialiased">
  <main class="px-4 py-4 sm:px-6 lg:px-8">
    <div class="mx-auto max-w-7xl">
      <header class="mb-8 bg-white px-5 py-5 shadow-sm sm:px-8">
        <div class="flex items-center">

            <span class="flex h-16 w-16 items-center justify-center rounded-lg bg-white">

            </span>
            <span class="text-3xl font-black text-black sm:text-4xl">Brainok</span>
          </a>
        </div>
      </header>

      <section class="mb-8 overflow-hidden bg-white shadow-sm">

      </section>

      <section class="pb-8 text-center">
        <h1 class="text-3xl font-black text-black sm:text-4xl">Research와 Computer Tips</h1>
      </section>

      <section id="board" class="grid gap-8 lg:grid-cols-2">

            <img src="/assets/research-bg.png" alt="Research" class="aspect-[16/9] w-full object-cover">
          </a>
          <div id="research-links" class="p-5 sm:p-6">
            <div class="grid gap-4">
              <a href="/about.html" class="page-link border border-slate-200 bg-slate-50 p-5 transition hover:border-sky-500 hover:bg-white">
                <span class="text-xs font-black uppercase text-slate-500">Profile</span>
                <span class="mt-2 block text-2xl font-black text-black">About</span>
              </a>

              <a href="/publication.html" class="page-link border border-slate-200 bg-slate-50 p-5 transition hover:border-sky-500 hover:bg-white">
                <span class="text-xs font-black uppercase text-slate-500">Publications</span>
                <span class="mt-2 block text-2xl font-black text-black">Publication</span>
              </a>

              <div class="grid gap-4 sm:grid-cols-3">
                <a href="/board.html?group=Research&item=BT" class="page-link border border-slate-200 bg-slate-50 p-5 transition hover:border-sky-500 hover:bg-white">
                  <span class="text-xs font-black uppercase text-slate-500">Board</span>
                  <span class="mt-2 block text-xl font-black text-black">BT</span>
                  <span class="mt-1 block text-sm font-semibold text-slate-600">Bio Technology</span>
                </a>

                <a href="/board.html?group=Research&item=IT" class="page-link border border-slate-200 bg-slate-50 p-5 transition hover:border-sky-500 hover:bg-white">
                  <span class="text-xs font-black uppercase text-slate-500">Board</span>
                  <span class="mt-2 block text-xl font-black text-black">IT</span>
                  <span class="mt-1 block text-sm font-semibold text-slate-600">Information Technology</span>
                </a>

                <a href="/board.html?group=Research&item=Clinical" class="page-link border border-slate-200 bg-slate-50 p-5 transition hover:border-sky-500 hover:bg-white">
                  <span class="text-xs font-black uppercase text-slate-500">Board</span>
                  <span class="mt-2 block text-xl font-black text-black">Clinical</span>
                  <span class="mt-1 block text-sm font-semibold text-slate-600">Research</span>
                </a>
              </div>
            </div>
          </div>
        </article>

          <a href="#computer-links" class="page-link block">
            <img src="/assets/computer-bg.png" alt="Computer tips" class="aspect-[16/9] w-full object-cover">
          </a>
          <div id="computer-links" class="p-5 sm:p-6">
            <div class="grid gap-4 sm:grid-cols-2">
              <a href="/board.html?group=Computer%20tips&item=Excel" class="page-link border border-slate-200 bg-slate-50 p-5 transition hover:border-orange-500 hover:bg-white">
                <span class="text-xs font-black uppercase text-slate-500">Computer Tips</span>
                <span class="mt-2 block text-2xl font-black text-black">Excel</span>
              </a>

              <a href="/board.html?group=Computer%20tips&item=Word" class="page-link border border-slate-200 bg-slate-50 p-5 transition hover:border-orange-500 hover:bg-white">
                <span class="text-xs font-black uppercase text-slate-500">Computer Tips</span>
                <span class="mt-2 block text-2xl font-black text-black">Word</span>
              </a>

              <a href="/board.html?group=Computer%20tips&item=%EC%95%84%EB%9E%98%ED%95%9C%EA%B8%80" class="page-link border border-slate-200 bg-slate-50 p-5 transition hover:border-orange-500 hover:bg-white">

                <span class="mt-2 block text-2xl font-black text-black">아래한글</span>
              </a>

              <a href="/board.html?group=Computer%20tips&item=Statistics" class="page-link border border-slate-200 bg-slate-50 p-5 transition hover:border-orange-500 hover:bg-white">
                <span class="text-xs font-black uppercase text-slate-500">Computer Tips</span>
                <span class="mt-2 block text-2xl font-black text-black">Statistics</span>
              </a>

              <a href="/board.html?group=Computer%20tips&item=Education" class="page-link border border-slate-200 bg-slate-50 p-5 transition hover:border-orange-500 hover:bg-white">
                <span class="text-xs font-black uppercase text-slate-500">Computer Tips</span>
                <span class="mt-2 block text-2xl font-black text-black">Education</span>
              </a>

              <a href="/board.html?group=Computer%20tips&item=Program" class="page-link border border-slate-200 bg-slate-50 p-5 transition hover:border-orange-500 hover:bg-white">
                <span class="text-xs font-black uppercase text-slate-500">Computer Tips</span>
                <span class="mt-2 block text-2xl font-black text-black">Program</span>
              </a>

              <a href="/board.html?group=Computer%20tips&item=Etc" class="page-link border border-slate-200 bg-slate-50 p-5 transition hover:border-orange-500 hover:bg-white sm:col-span-2">
                <span class="text-xs font-black uppercase text-slate-500">Computer Tips</span>
                <span class="mt-2 block text-2xl font-black text-black">Etc</span>
              </a>
            </div>
          </div>

    </div>

</html>
