  <script>
    // ============== HELPER FUNCTIONS ==============
    // UTF-8 바이트 길이 계산 함수
    function getUtf8BytesLength(str) {
      if (!str) return 0;
      return new TextEncoder().encode(str).length;
    }

    // 파일 크기를 읽기 쉬운 형태로 변환
    function formatFileSize(bytes) {
      if (bytes === 0) return '0 Bytes';
      const k = 1024;
      const sizes = ['Bytes', 'KB', 'MB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }
    
    // 이미지 압축 함수
    function compressImage(file, maxWidth = 1024, maxHeight = 768, quality = 0.8) {
      return new Promise((resolve) => {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const img = new Image();
        
        img.onload = function() {
          // 원본 크기
          let { width, height } = img;
          
          // 비율 유지하면서 크기 조정
          if (width > height) {
            if (width > maxWidth) {
              height = (height * maxWidth) / width;
              width = maxWidth;
            }
          } else {
            if (height > maxHeight) {
              width = (width * maxHeight) / height;
              height = maxHeight;
            }
          }
          
          // 캔버스 크기 설정
          canvas.width = width;
          canvas.height = height;
          
          // 이미지 그리기
          ctx.drawImage(img, 0, 0, width, height);
          
          // 압축된 이미지 반환
          canvas.toBlob(resolve, 'image/jpeg', quality);
        };
        
        img.src = URL.createObjectURL(file);
      });
    }

    const firebaseConfig = {
      apiKey: "AIzaSyBuh12por70BMDhYjwU-uc0FctVmznP6bU",
      authDomain: "brainok-lab-site.firebaseapp.com",
      projectId: "brainok-lab-site",

      messagingSenderId: "790821922593",
      appId: "1:790821922593:web:d9c66a6dcefb8f11964060"
    };
    firebase.initializeApp(firebaseConfig);
    const firebaseAuth = firebase.auth();
    const firebaseDB = firebase.firestore();
    const firebaseStorage = firebase.storage();
    window.firebaseAuth = firebaseAuth;
    window.firebaseDB = firebaseDB;
    window.firebaseStorage = firebaseStorage;
  </script>

  <script>
    // 이미지 압축 함수
    function compressImage(file, maxWidth = 1024, maxHeight = 768, quality = 0.8) {
      return new Promise((resolve) => {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const img = new Image();
        
        img.onload = function() {
          // 원본 크기
          let { width, height } = img;
          
          // 비율 유지하면서 크기 조정
          if (width > height) {
            if (width > maxWidth) {
              height = (height * maxWidth) / width;
              width = maxWidth;
            }
          } else {
            if (height > maxHeight) {
              width = (width * maxHeight) / height;
              height = maxHeight;
            }
          }
          
          // 캔버스 크기 설정
          canvas.width = width;
          canvas.height = height;
          
          // 이미지 그리기
          ctx.drawImage(img, 0, 0, width, height);
          
          // 압축된 이미지 반환
          canvas.toBlob(resolve, 'image/jpeg', quality);
        };
        
        img.src = URL.createObjectURL(file);
      });
    }

    // 파일 크기를 읽기 쉬운 형태로 변환 (이미 추가된 경우 확인)
    function formatFileSize(bytes) {
      if (bytes === 0) return '0 Bytes';
      const k = 1024;
      const sizes = ['Bytes', 'KB', 'MB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    // UTF-8 바이트 길이 계산 함수
    function getUtf8BytesLength(str) {
      return new TextEncoder().encode(str).length;
    }

    // 알림 시스템
    function showNotification(message, type = 'success') {
      const notification = document.createElement('div');
      notification.className = `notification ${type}`;
      notification.textContent = message;
      document.body.appendChild(notification);
      
      // 애니메이션을 위한 delay
      setTimeout(() => {
        notification.classList.add('show');
      }, 100);
      
      // 3초 후 자동 삭제
      setTimeout(() => {
        notification.classList.remove('show');
        setTimeout(() => {
          if (notification.parentNode) {
            notification.parentNode.removeChild(notification);
          }
        }, 300);
      }, 3000);
    }

    document.addEventListener('DOMContentLoaded', async () => {
      let currentUID = null;

      firebaseAuth.onAuthStateChanged(async (user) => {
        if (user) {
          currentUID = user.uid;
          document.getElementById('userInfo').innerHTML = `✅ 로그인됨 | UID: ${user.uid}`;
          document.getElementById('loginForm').style.display = 'none';
          await initializeEditor();
        } else {
          document.getElementById('userInfo').innerHTML = '❌ 로그인이 필요합니다';
          document.getElementById('loginForm').style.display = 'block';
        }
      });

      async function login() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        try { await firebaseAuth.signInWithEmailAndPassword(email, password); }
        catch (e) { showNotification('로그인 실패: ' + e.message, 'error'); }
      }
      async function signup() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        try { await firebaseAuth.createUserWithEmailAndPassword(email, password); }
        catch (e) { showNotification('회원가입 실패: ' + e.message, 'error'); }
      }
      document.getElementById('loginBtn').onclick = login;
      document.getElementById('signupBtn').onclick = signup;

      // 미디어 파일 업로드 기능
      async function uploadMediaFile(file, type) {
        if (!currentUID) {
          showNotification('로그인이 필요합니다.', 'warning');
          return;
        }

        const uploadStatus = document.getElementById('uploadStatus');
        uploadStatus.textContent = '업로드 중...';
        uploadStatus.style.color = '#f59e0b';

        try {
          const timestamp = Date.now();
          const fileName = `${currentUID}_${timestamp}_${file.name}`;
          const storageRef = firebaseStorage.ref();
          const fileRef = storageRef.child(`media/${type}/${fileName}`);
          
          const snapshot = await fileRef.put(file);
          const downloadURL = await snapshot.ref.getDownloadURL();
          
          uploadStatus.textContent = '업로드 완료!';
          uploadStatus.style.color = '#10b981';
          
          // 에디터에 링크 삽입
          const ed = tinymce.activeEditor;
          if (ed) {
            const linkText = `${type === 'audio' ? '🎵' : type === 'video' ? '🎬' : '🖼️'} ${file.name}`;
            const mediaHTML = type === 'audio' 
              ? `<audio controls><source src="${downloadURL}" type="audio/${file.name.split('.').pop()}">브라우저가 오디오 재생을 지원하지 않습니다.</audio>`
              : type === 'video'
              ? `<video controls width="100%"><source src="${downloadURL}" type="video/${file.name.split('.').pop()}">브라우저가 비디오 재생을 지원하지 않습니다.</video>`
              : `<img src="${downloadURL}" alt="${file.name}" style="max-width:100%; height:auto;">`;
            
            ed.insertContent(mediaHTML);
          }
          
          // 3초 후 상태 메시지 지우기
          setTimeout(() => {
            uploadStatus.textContent = '';
          }, 3000);
          
        } catch (error) {
          console.error('업로드 실패:', error);
          uploadStatus.textContent = '업로드 실패: ' + error.message;
          uploadStatus.style.color = '#ef4444';
        }
      }

      // 파일 업로드 이벤트 리스너
      document.getElementById('audioFile').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
          uploadMediaFile(file, 'audio');
        }
      });

      document.getElementById('videoFile').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
          uploadMediaFile(file, 'video');
        }
      });

      document.getElementById('imageFile').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
          uploadMediaFile(file, 'image');
        }
      });

      // 구글 드라이브 링크 처리
      window.insertDriveLink = function() {
        console.log('insertDriveLink 함수 호출됨');
        const driveLink = document.getElementById('driveLink').value.trim();
        console.log('입력된 링크:', driveLink);
        
        if (!driveLink) {
          showNotification('구글 드라이브 링크를 입력해주세요.', 'warning');
          return;
        }

        const uploadStatus = document.getElementById('uploadStatus');
        uploadStatus.textContent = '링크 처리 중...';
        uploadStatus.style.color = '#f59e0b';

        try {
          // 구글 드라이브 링크에서 파일 ID 추출
          const fileId = extractGoogleDriveFileId(driveLink);
          console.log('추출된 파일 ID:', fileId);
          
          if (!fileId) {
            uploadStatus.textContent = '올바른 구글 드라이브 링크가 아닙니다.';
            uploadStatus.style.color = '#ef4444';
            return;
          }

          // 파일 타입 추정 (확장자 기반)
          const fileType = getFileTypeFromDriveLink(driveLink);
          console.log('파일 타입:', fileType);
          
          // 에디터에 미디어 삽입
          const ed = tinymce.activeEditor;
          console.log('에디터 상태:', ed);
          
          if (ed) {
            const mediaHTML = createMediaHTML(fileId, fileType);
            console.log('생성된 HTML:', mediaHTML);
            ed.insertContent(mediaHTML);
            
            uploadStatus.textContent = '구글 드라이브 링크 삽입 완료!';
            uploadStatus.style.color = '#10b981';
            
            // 입력 필드 초기화
            document.getElementById('driveLink').value = '';
          } else {
            uploadStatus.textContent = '에디터가 준비되지 않았습니다.';
            uploadStatus.style.color = '#ef4444';
          }
          
          // 3초 후 상태 메시지 지우기
          setTimeout(() => {
            uploadStatus.textContent = '';
          }, 3000);
          
        } catch (error) {
          console.error('링크 처리 실패:', error);
          uploadStatus.textContent = '링크 처리 실패: ' + error.message;
          uploadStatus.style.color = '#ef4444';
        }
      }

      // 구글 드라이브 링크에서 파일 ID 추출
      window.extractGoogleDriveFileId = function(url) {
        // 다양한 구글 드라이브 링크 형식 지원
        const patterns = [
          /\/file\/d\/([a-zA-Z0-9-_]+)/,  // /file/d/FILE_ID
          /id=([a-zA-Z0-9-_]+)/,          // ?id=FILE_ID
          /\/d\/([a-zA-Z0-9-_]+)/,        // /d/FILE_ID
          /\/open\?id=([a-zA-Z0-9-_]+)/   // /open?id=FILE_ID
        ];
        
        for (const pattern of patterns) {
          const match = url.match(pattern);
          if (match) return match[1];
        }
        return null;
      }

      // 파일 타입 추정
      window.getFileTypeFromDriveLink = function(url) {
        const audioExtensions = ['.m4a', '.mp3', '.wav', '.ogg', '.flac'];
        const videoExtensions = ['.mp4', '.avi', '.mov', '.wmv', '.flv', '.webm'];
        const imageExtensions = ['.jpg', '.jpeg', '.png', '.gif', '.webp', '.bmp'];
        
        const lowerUrl = url.toLowerCase();
        
        if (audioExtensions.some(ext => lowerUrl.includes(ext))) return 'audio';
        if (videoExtensions.some(ext => lowerUrl.includes(ext))) return 'video';
        if (imageExtensions.some(ext => lowerUrl.includes(ext))) return 'image';
        
        return 'unknown';
      }

      // 미디어 HTML 생성
      window.createMediaHTML = function(fileId, fileType) {
        const directLink = `https://drive.google.com/uc?export=download&id=${fileId}`;
        const embedLink = `https://drive.google.com/file/d/${fileId}/preview`;
        
        switch (fileType) {
          case 'audio':
            return `<audio controls><source src="${directLink}" type="audio/mpeg">브라우저가 오디오 재생을 지원하지 않습니다.</audio>`;
          case 'video':
            return `<video controls width="100%"><source src="${directLink}" type="video/mp4">브라우저가 비디오 재생을 지원하지 않습니다.</video>`;
          case 'image':

      // 직접 링크 HTML 생성
      window.createDirectLinkHTML = function(url) {
        const lowerUrl = url.toLowerCase();
        
        // 오디오 파일
        if (/\.(m4a|mp3|wav|ogg|flac)(\?.*)?$/i.test(lowerUrl)) {
          return `<audio controls><source src="${url}" type="audio/mpeg">브라우저가 오디오 재생을 지원하지 않습니다.</audio>`;
        }
        
        // 비디오 파일
        if (/\.(mp4|avi|mov|wmv|flv|webm|ogg)(\?.*)?$/i.test(lowerUrl)) {
          return `<video controls width="100%"><source src="${url}" type="video/mp4">브라우저가 비디오 재생을 지원하지 않습니다.</video>`;
        }
        
        // 이미지 파일
        if (/\.(jpg|jpeg|png|gif|webp|bmp)(\?.*)?$/i.test(lowerUrl)) {
          return `<img src="${url}" alt="이미지" style="max-width:100%; height:auto;">`;
        }
        
        // 일반 링크
        return `<a href="${url}" target="_blank">${url}</a>`;
      }

      const qs = (k) => new URL(location.href).searchParams.get(k);
      const id = qs('id');
      const groupParam = qs('group');
      const itemParam = qs('item');

      async function loadForEdit() {
        if (!id || !currentUID) {
          console.log('loadForEdit: id 또는 currentUID가 없음', { id, currentUID });
          return null;
        }
        try {
          console.log('loadForEdit: 사용자 포스트에서 검색 중...', { id, currentUID });
          const myRef = firebaseDB.collection('users').doc(currentUID).collection('posts').doc(id);
          const mySnap = await myRef.get();
          if (mySnap.exists) {
            let item = mySnap.data();
            if (item.contentUrl) {
              const response = await fetch(item.contentUrl);
              item.content = await response.text();
            }
            console.log('loadForEdit: 사용자 포스트 발견', { title: item.title, contentLength: item.content?.length });
            title.value = item.title || '';
            group.value = item.group || groupParam || 'Research';
            category.value = item.category || itemParam || 'BT';
            return item;
          }
          
          console.log('loadForEdit: 공개 포스트에서 검색 중...');
          const pubRef = firebaseDB.collection('public_posts').doc(id);
          const pubSnap = await pubRef.get();
          if (pubSnap.exists) {
            let item = pubSnap.data();
            if (item.contentUrl) {
              const response = await fetch(item.contentUrl);
              item.content = await response.text();
            }
            console.log('loadForEdit: 공개 포스트 발견', { title: item.title, contentLength: item.content?.length });
            title.value = item.title || '';
            group.value = item.group || groupParam || 'Research';
            category.value = item.category || item.item || itemParam || 'BT';
            return item;
          }
          
          console.log('loadForEdit: 포스트를 찾을 수 없음');
        } catch (e) {
          console.error('글 불러오기 실패:', e);
        }
        return null;
      }

      async function initTiny() {

        }

        const loadedPost = await loadForEdit();

        await tinymce.init({
          selector: '#content',

          setup: function(editor) {

            'p,li,blockquote,td,th{overflow-wrap:anywhere;word-break:break-word} ' +
            '.mce-content-body{line-height:1.7}',
          paste_data_images: false,
          automatic_uploads: false,
          // Firebase Storage로 이미지 업로드하여 base64 삽입 방지
          images_upload_handler: (blobInfo) => new Promise(async (resolve, reject) => {
            try {
              console.log('이미지 업로드 시작:', blobInfo.filename());
              
              if (!currentUID) {
                console.error('사용자 ID가 없습니다.');
                reject(new Error('로그인이 필요합니다.'));
                return;
              }
              
              let fileBlob = blobInfo.blob();
              console.log('원본 파일 크기:', formatFileSize(fileBlob.size), '타입:', fileBlob.type);
              
              // 이미지 파일이고 1MB보다 크면 압축
              if (fileBlob.type.startsWith('image/') && fileBlob.size > 1024 * 1024) {
                console.log('이미지 압축 시작...');
                
                // File 객체로 변환
                const file = new File([fileBlob], blobInfo.filename() || 'image.jpg', { type: fileBlob.type });
                const compressedBlob = await compressImage(file);
                
                if (compressedBlob && compressedBlob.size < fileBlob.size) {
                  fileBlob = compressedBlob;
                  console.log('압축 완료! 새 크기:', formatFileSize(fileBlob.size));
                  showNotification(`이미지 압축 완료: ${formatFileSize(compressedBlob.size)}`, 'success');
                } else {
                  console.log('압축 실패 또는 압축 효과 없음');
                }
              }
              
              const ext = (blobInfo.filename() || 'image').split('.').pop() || 'jpg';
              const path = `images/${currentUID}/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
              console.log('저장 경로:', path);
              
              const storageRef = firebaseStorage.ref().child(path);
              const snapshot = await storageRef.put(fileBlob, { contentType: fileBlob.type || 'image/jpeg' });
              console.log('업로드 완료:', snapshot);
              
              const url = await snapshot.ref.getDownloadURL();
              console.log('다운로드 URL:', url);
              
              // URL이 제대로 생성되었는지 확인
              if (!url || url.includes('undefined')) {
                throw new Error('유효하지 않은 URL이 생성되었습니다.');
              }
              
              console.log('이미지 URL 반환:', url);
              resolve(url);
              
            } catch (err) { 
              console.error('이미지 업로드 실패:', err);
              reject(err); 
            }
          }),
        });

        const ed = tinymce.activeEditor;
        if (ed && loadedPost?.content) {
          console.log('에디터에 콘텐츠 설정:', { contentLength: loadedPost.content.length });
          ed.setContent(loadedPost.content);
        } else if (ed && loadedPost?.contentUrl) {
          console.log('Storage에서 콘텐츠 로드 중:', loadedPost.contentUrl);
          try {
            const resp = await fetch(loadedPost.contentUrl);
            const html = await resp.text();
            console.log('Storage에서 로드된 콘텐츠 길이:', html.length);
            ed.setContent(html);
          } catch (error) {
            console.error('Storage에서 콘텐츠 로드 실패:', error);
          }
        } else if (!loadedPost) {
          console.warn('loadForEdit() 결과 없음 또는 content 비어있음');
        } else if (ed) {
          console.log('에디터는 준비되었지만 로드할 콘텐츠가 없음');
        }
        
        // 이미지 붙여넣기 이벤트 처리
        if (ed) {
          ed.on('PastePreProcess', async function(e) {
            console.log('붙여넣기 이벤트 감지:', e);
            if (e.content && e.content.includes('data:image')) {
              console.log('이미지 붙여넣기 감지');
              
              // base64 이미지를 찾아서 업로드하고 URL로 교체
              const imgMatches = e.content.match(/data:image\/[^;]+;base64,[^"]+/g);
              if (imgMatches) {
                let processedContent = e.content;
                console.log('원본 콘텐츠 길이:', processedContent.length);
                
                for (const imgData of imgMatches) {
                  try {
                    const response = await fetch(imgData);
                    let blob = await response.blob();
                    
                    console.log('붙여넣기 이미지 원본 크기:', formatFileSize(blob.size));
                    
                    // 1MB보다 크면 압축
                    if (blob.size > 1024 * 1024) {
                      console.log('붙여넣기 이미지 압축 시작...');
                      const file = new File([blob], 'pasted-image.jpg', { type: blob.type });
                      const compressedBlob = await compressImage(file);
                      
                      if (compressedBlob && compressedBlob.size < blob.size) {
                        blob = compressedBlob;
                        console.log('붙여넣기 이미지 압축 완료:', formatFileSize(blob.size));
                        showNotification(`이미지 압축 완료: ${formatFileSize(compressedBlob.size)}`, 'success');
                      }
                    }
                    
                    const ext = 'jpg';
                    const path = `images/${currentUID}/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
                    const storageRef = firebaseStorage.ref().child(path);
                    const snapshot = await storageRef.put(blob, { contentType: blob.type || 'image/jpeg' });
                    const url = await snapshot.ref.getDownloadURL();
                    
                    console.log('이미지 업로드 완료:', url);
                    
                    // 원본 콘텐츠에서 base64 이미지를 URL로 교체
                    processedContent = processedContent.replace(imgData, url);
                  } catch (error) {
                    console.error('이미지 업로드 실패:', error);
                  }
                }
                
                console.log('처리된 콘텐츠 길이:', processedContent.length);
                // 처리된 콘텐츠로 교체
                e.content = processedContent;
              }
            }
          });
        }
      }

      // data URL 이미지를 Storage로 올리고 본문 내 src를 모두 URL로 교체
      async function normalizeImagesInEditor(editor){
        if (!currentUID) {
          console.warn('사용자 ID가 없어서 이미지 정규화를 건너뜁니다.');
          return;
        }
        
        const images = editor.dom.select('img');
        console.log('정규화할 이미지 개수:', images.length);
        
        for (const img of images) {
          const src = img.getAttribute('src') || '';
          if (src.startsWith('data:')) {
            try {
              console.log('base64 이미지 발견, 업로드 시작...');
              let blob = await (await fetch(src)).blob();
              
              console.log('정규화 이미지 원본 크기:', formatFileSize(blob.size));
              
              // 1MB보다 크면 압축
              if (blob.size > 1024 * 1024) {
                console.log('정규화 이미지 압축 시작...');
                const file = new File([blob], 'normalized-image.jpg', { type: blob.type });
                const compressedBlob = await compressImage(file);
                
                if (compressedBlob && compressedBlob.size < blob.size) {
                  blob = compressedBlob;
                  console.log('정규화 이미지 압축 완료:', formatFileSize(blob.size));
                }
              }
              
              const ext = (blob.type && blob.type.split('/')[1]) || 'jpg';
              const path = `images/${currentUID}/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
              const storageRef = firebaseStorage.ref().child(path);
              const snapshot = await storageRef.put(blob, { contentType: blob.type || 'image/jpeg' });
              const url = await snapshot.ref.getDownloadURL();
              img.setAttribute('src', url);
              console.log('이미지 정규화 완료:', url);
            } catch (e) {
              console.error('이미지 업로드 실패:', e);
            }
          }
        }
      }

      async function save() {
        if (!currentUID) {
          showNotification('사용자 인증이 필요합니다.', 'warning');
          return;
        }
        const ed = tinymce.activeEditor; 
        if (!ed) {
          showNotification('에디터가 아직 준비되지 않았습니다.', 'warning');
          return;
        }

        const now = new Date().toISOString();
        const postId = qs('id') || Date.now().toString();

        // 저장 전에 base64 이미지를 모두 Storage URL로 바꾼다
        await normalizeImagesInEditor(ed);

        const content = ed.getContent();
        console.log('저장할 콘텐츠 길이:', content.length);
        console.log('저장할 콘텐츠 미리보기:', content.substring(0, 200));

        const payload = {
          id: postId, uid: currentUID,
          title: title.value.trim(),
          group: group.value || groupParam,
          category: category.value || itemParam,
          item: category.value || itemParam,
          publish: true,
          content: content,
          plain: ed.getContent({ format: 'text' }).slice(0, 200),
          updatedAt: now
        };
        if (!qs('id')) payload.createdAt = now;
        if (!payload.title) {
          showNotification('제목을 입력하세요.', 'warning');
          return;
        }
        if (!payload.group || !payload.category) {
          showNotification('그룹/카테고리를 선택하세요.', 'warning');
          return;
        }

        // 대용량 콘텐츠 처리
        const contentBytes = payload.content ? getUtf8BytesLength(payload.content) : 0;
        console.log('콘텐츠 크기:', formatFileSize(contentBytes));

        if (contentBytes > 500 * 1024) {
          console.log('대용량 콘텐츠: Storage에 저장');
          const contentPath = `contents/${postId}.html`;
          const contentRef = firebaseStorage.ref().child(contentPath);
          const contentBlob = new Blob([payload.content], { type: 'text/html' });
          const snapshot = await contentRef.put(contentBlob);
          payload.contentUrl = await snapshot.ref.getDownloadURL();
          delete payload.content;  // Firestore에는 URL만 저장
          console.log('Storage URL:', payload.contentUrl);
        } else {
          delete payload.contentUrl;
        }

        console.log('Firebase에 저장 중...', { 
          postId, 
          contentLength: payload.content?.length || 0,
          hasContentUrl: !!payload.contentUrl 
        });
        
        try {
          await firebaseDB.collection('users').doc(currentUID).collection('posts').doc(postId).set(payload);
          await firebaseDB.collection('public_posts').doc(postId).set({ ...payload, authorUid: currentUID, publish: payload.publish !== false });
          
          console.log('저장 완료!');
          
          // 저장 후 즉시 확인
          try {
            const savedDoc = await firebaseDB.collection('public_posts').doc(postId).get();
            if (savedDoc.exists) {
              const savedData = savedDoc.data();
              console.log('저장 확인:', {
                title: savedData.title,
                contentLength: savedData.content?.length || 0,
                hasContentUrl: !!savedData.contentUrl
              });
            }
          } catch (e) {
            console.error('저장 확인 실패:', e);
          }
          
          showNotification(`저장 완료! (크기: ${formatFileSize(contentBytes)})`, 'success');
          location.href = `viewer.html?id=${encodeURIComponent(postId)}&group=${encodeURIComponent(payload.group)}&item=${encodeURIComponent(payload.category)}`;
        } catch (e) {
          console.error('저장 실패:', e);
          showNotification('Firebase 저장 중 오류: ' + e.message, 'error');
        }
      }

      async function removePost() {
        if (!currentUID) {
          showNotification('사용자 인증이 필요합니다.', 'warning');
          return;
        }
        if (!id) {
          showNotification('삭제할 글이 없습니다.', 'warning');
          return;
        }
        const ok = confirm('정말 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.');
        if (!ok) return;

        try {
          await Promise.allSettled([
            firebaseDB.collection('users').doc(currentUID).collection('posts').doc(id).delete(),
            firebaseDB.collection('public_posts').doc(id).delete()
          ]);
          showNotification('삭제 완료!', 'success');
          location.href = (groupParam && itemParam)
            ? `board.html?group=${encodeURIComponent(groupParam)}&item=${encodeURIComponent(itemParam)}`
            : 'index.html';
        } catch (e) {
          console.error('삭제 실패:', e);
          showNotification('삭제 중 오류: ' + e.message, 'error');
        }
      }

      async function initializeEditor() { await initTiny(); }

      document.getElementById('saveBtn').onclick = save;

      const deleteBtn = document.getElementById('deleteBtn');
      if (deleteBtn) {
        if (id) deleteBtn.style.display = 'inline-block';
        deleteBtn.onclick = removePost;
      }

      document.getElementById('backLink').href = (groupParam && itemParam)
        ? `board.html?group=${encodeURIComponent(groupParam)}&item=${encodeURIComponent(itemParam)}`
        : 'index.html';

      (function initThemeToggle(){
        const KEY = 'bol_theme';
        const btn = document.getElementById('themeToggle');
        function setTheme(t){
          document.documentElement.setAttribute('data-theme', t);
          localStorage.setItem(KEY, t);
          if (btn) btn.textContent = t === 'dark' ? '🌙' : '☀️';
          if (typeof tinymce !== 'undefined') { tinymce.remove(); setTimeout(() => initTiny(), 0); }
        }
        function getTheme(){ return localStorage.getItem(KEY) || 'light'; }
        setTheme(getTheme());
        if (btn) btn.onclick = () => setTheme(getTheme() === 'dark' ? 'light' : 'dark');
      })();
    });
  </script>
</body>
</html>
